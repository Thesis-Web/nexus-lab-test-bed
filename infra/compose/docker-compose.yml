services:
  postgres:
    image: postgres:16
    container_name: nexus-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LAB_POSTGRES_DB}
      POSTGRES_USER: ${LAB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LAB_POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${LAB_POSTGRES_PORT}:5432"
    volumes:
      - ${LAB_PGDATA_HOST_PATH}:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${LAB_POSTGRES_USER} -d ${LAB_POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:8.6
    container_name: nexus-lab-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${LAB_PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${LAB_PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:${LAB_PGADMIN_PORT}:80"
    volumes:
      - ${LAB_PGADMIN_HOST_PATH}:/var/lib/pgadmin
